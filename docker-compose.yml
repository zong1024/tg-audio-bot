services:
  # Telegram Local Bot API Server（必须先启动）
  telegram-bot-api:
    build:
      context: .
      dockerfile: Dockerfile.tg-api
    container_name: telegram-bot-api
    restart: unless-stopped
    network_mode: host
    environment:
      - TELEGRAM_API_ID=35573684
      - TELEGRAM_API_HASH=2fafcc9178bdb386178c9185b8ec0276

  # 音频下载 Bot（依赖 API 服务器）
  tg-audio-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-audio-bot
    restart: unless-stopped
    network_mode: host
    depends_on:
      telegram-bot-api:
        condition: service_started
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - AUDIO_FORMAT=flac
      - HTTP_PROXY=http://${PROXY_HOST:-192.168.0.103}:${PROXY_HTTP_PORT:-1081}
      - HTTPS_PROXY=http://${PROXY_HOST:-192.168.0.103}:${PROXY_HTTP_PORT:-1081}
      - ALL_PROXY=socks5://${PROXY_HOST:-192.168.0.103}:${PROXY_SOCKS_PORT:-1080}
      - NO_PROXY=127.0.0.1,localhost,192.168.0.112
      - BILIBILI_COOKIES=/app/cookies.txt
      - LOCAL_API_URL=http://127.0.0.1:8081
      - PYTHONUNBUFFERED=1
    volumes:
      - ${NAS_PATH:-/volume1/@home/ZongRui/Music}:/downloads
      - ./cookies.txt:/app/cookies.txt:ro
